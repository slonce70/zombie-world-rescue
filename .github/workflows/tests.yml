# CI для Pages-релізу: push у main одразу деплоїться.
# Швидкий гейт `smoke` має червоніти миттєво; кооп і UKR e2e — окремі джоби
# (повільніші на безкоштовному раннері з софтверним рендером), тож не тримають швидкий гейт.
name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Version sync (version.json ↔ APP_VERSION ↔ PROTO_VERSION)
        run: node test/version-sync.mjs
      - name: Relay reconnect edge (full room + same pid resume)
        # мережевий тест: на free-runner буває разовий таймаут-флейк → 1 повтор (реальна
        # регресія впаде двічі, тож гейт лишається блокуючим)
        run: SLOW=4 node test/relay-reconnect.mjs || (echo "↻ мережевий флейк — повтор" && SLOW=4 node test/relay-reconnect.mjs)
      - run: npx playwright install --with-deps chromium
      - name: Start static server
        run: python3 -m http.server 8741 &
      - name: Smoke (рендер, постріл, fps)
        run: node test/smoke.mjs
      - name: Version check (авто-оновлення клієнта)
        run: node test/version-check.mjs
      - name: Cloud save (хмарний сейв, фільтр ніків, краш-екран)
        # мережевий тест (relay-спавн + SaveVault): на free-runner буває разовий таймаут-флейк
        # → 1 повтор (реальна регресія впаде двічі, гейт лишається блокуючим)
        run: SLOW=4 node test/cloudsave.mjs || (echo "↻ мережевий флейк — повтор" && SLOW=4 node test/cloudsave.mjs)
      - name: i18n (українська/English/русский)
        run: node test/i18n.mjs
      - name: Coop damage (шкода зомбі НЕ множиться на гравців)
        run: node test/coop-damage.mjs
      - name: Coop nick (фільтр лайки в коопних ніках — безпека дітей)
        run: node test/coop-nick.mjs

  # 🤝 кооп — найскладніша й найрегресійніша підсистема. Окремий джоб (паралельно зі smoke).
  # NON-BLOCKING (continue-on-error): на безкоштовному раннері headless-вкладку гостя так
  # сильно тротлить, що один крок тесту триває хвилини — і хост встигає прибрати гостя як
  # "stale" (>120с тиші), хоча вся синхронізація/бій проходять. Тож кооп тут — ВИДИМИЙ СИГНАЛ
  # (червоніє в Actions при регресії), але не валить весь ран хибним флейком. Локально (швидко)
  # і на потужнішому раннері проходить стабільно; жорсткі гейти — smoke + e2e.
  coop:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    continue-on-error: true
    # continue-on-error лишається: free-runner тротлить гостя і дає таймаут-флейк.
    # Реальні регресії ловляться локально (SLOW=4) + B1 (тести більше не «зеленіють» на сироті).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start static server
        run: python3 -m http.server 8741 &
      - name: Coop base (кімната/лобі/синхронізація/кіл-кредити)
        timeout-minutes: 25
        run: SLOW=4 node test/coop.mjs
      - name: Coop reconnect (mid-join + resume)
        timeout-minutes: 20
        run: SLOW=4 node test/coop3.mjs
      - name: Coop lobby/batching
        timeout-minutes: 15
        run: SLOW=4 node test/coop6.mjs

  # повний e2e — окремим джобом: на безкоштовному раннері з софтверним рендером
  # він іде у рази довше, ніж локально (~4 хв), тому не тримає швидкий гейт
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start static server
        run: python3 -m http.server 8741 &
      - name: E2E кампанія UKR (SLOW=4 — софтверний рендер ранера)
        timeout-minutes: 45
        run: SLOW=4 node test/e2e.mjs

  # 🧪 розширена батарея: update*/campaign/maps/replay/terrain — НЕ блокує деплой
  # (як coop), але червоніє в Actions при регресії квестів/Шторму/гаджетів/карт.
  extended:
    runs-on: ubuntu-latest
    timeout-minutes: 50
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start static server
        run: python3 -m http.server 8741 &
      - name: Save migration guard
        run: node test/save-migration.mjs
      - name: Extended battery
        run: |
          for t in update2 update3 update4 update5 update6 update8 update9 update10 update11 update-bugfix weapons-fuel enemies-v47 update-spain update-italy crate-toast weapon-unlock xray-ghost campaign maps flows replay terrain-geometry; do
            echo "=== $t ==="; SLOW=4 node test/$t.mjs || exit 1
          done

# Мінімальний CI: push у main одразу деплоїться на GitHub Pages,
# тож хоч смоук+ядро мають світитись червоним, якщо щось зламалось.
name: tests
on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Start static server
        run: python3 -m http.server 8741 &
      - name: Smoke (рендер, постріл, fps)
        run: node test/smoke.mjs
      - name: Version check (авто-оновлення клієнта)
        run: node test/version-check.mjs
      - name: Cloud save (хмарний сейв, фільтр ніків, краш-екран)
        run: node test/cloudsave.mjs
      # повний e2e кампанії НЕ ганяємо: безкоштовний раннер рендерить софтверно
      # і не вкладається у 20 хв (локально тест іде ~4 хв) — він лишається
      # обовʼязковим локальним прогоном перед релізом
